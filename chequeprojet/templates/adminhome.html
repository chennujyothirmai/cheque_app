{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | ChequeVerify AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        *{margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif;}
        body{min-height:100vh; background:url('{% static "images/bg.jpg" %}') center/cover fixed; color:#111;}
        .overlay{min-height:100vh; background:rgba(255,255,255,0.45); backdrop-filter:blur(5px);}

        /* RESPONSIVE NAVBAR */
        .navbar{
            display:flex; justify-content:space-between; align-items:center;
            padding:15px 5%; background:rgba(0,0,0,0.9);
            backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.1);
            position:sticky; top:0; z-index:1000;
        }
        .navbar-brand{font-size:1.3rem; font-weight:800; color:#fff; letter-spacing:-0.5px;}
        .navbar ul{list-style:none; display:flex; gap:10px;}
        .navbar ul li a{
            text-decoration:none; color:#ddd; font-weight:600; font-size:0.85rem;
            padding:10px 14px; border-radius:12px; transition:0.3s;
            display:flex; align-items:center; gap:8px;
        }
        .navbar ul li a i{font-size:1.1rem;}
        .navbar ul li a:hover, .navbar ul li a.active{background:#ff3b30; color:#fff;}

        /* MOBILE NAV - ICONS ONLY */
        @media(max-width:768px){
            .navbar{padding:10px 3%; flex-direction:column; gap:8px;}
            .navbar-brand{font-size:1.1rem;}
            .navbar ul{width:100%; justify-content:space-around; gap:5px;}
            .navbar ul li a{padding:8px 10px; flex-direction:column; font-size:0.75rem; gap:4px; flex:1; text-align:center;}
            .navbar ul li a i{font-size:1.3rem;}
        }

        .content{padding:40px 5%;}
        .welcome-card{
            max-width:800px; margin:auto; padding:40px;
            background:rgba(255,255,255,0.85); border-radius:24px;
            box-shadow:0 20px 50px rgba(0,0,0,0.1); border:1px solid rgba(255,255,255,0.4);
            text-align:center;
        }
        .welcome-card h1{font-size:2.2rem; font-weight:800; color:#000; margin-bottom:15px;}
        .status-badge{
            display:inline-block; padding:8px 20px; border-radius:50px;
            background:#ff3b30; color:#fff; font-weight:700; font-size:0.9rem;
            margin-bottom:25px; box-shadow:0 5px 15px rgba(255, 59, 48, 0.3);
        }
        .grid-menu{
            display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
            gap:20px; margin-top:30px;
        }
        .menu-item{
            padding:30px; background:#fff; border-radius:20px; text-decoration:none;
            color:#111; transition:0.3s; border:1px solid #eee;
            display:flex; flex-direction:column; align-items:center; gap:12px;
        }
        .menu-item:hover{transform:translateY(-5px); border-color:#ff3b30; box-shadow:0 15px 30px rgba(0,0,0,0.05);}
        .menu-item i{font-size:2rem; color:#ff3b30;}
        .menu-item span{font-weight:700; font-size:1rem;}

        footer{text-align:center; padding:40px 20px; color:#666; font-size:0.85rem;}
    </style>
</head>
<body>
<div class="overlay">

    <nav class="navbar">
        <div class="navbar-brand">🛡️ Admin Console</div>
        <ul>
            <li><a href="{% url 'adminhome' %}" class="active"><i class="fa-solid fa-house"></i> <span>Home</span></a></li>
            <li><a href="{% url 'admin_users_list' %}"><i class="fa-solid fa-users"></i> <span>Users</span></a></li>
            <li><a href="{% url 'adminlogout' %}"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></a></li>
        </ul>
    </nav>

    <div class="content">
        <div class="welcome-card">
            <h1>Welcome, Admin!</h1>
            <div class="status-badge">Role: System Administrator</div>
            
            <p style="color:#666; font-size:1.1rem; margin-bottom:30px;">
                Manage user accounts and monitor the Automated Cheque Verification system.
            </p>

            <div class="grid-menu">
                <a href="{% url 'admin_users_list' %}" class="menu-item">
                    <i class="fa-solid fa-user-gear"></i>
                    <span>Manage Users</span>
                </a>
                <a href="{% url 'adminhome' %}" class="menu-item">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span>System Stats</span>
                </a>
            </div>
        </div>
    </div>

    <footer>
        © 2026 Admin Dashboard | Cheque Verification System
    </footer>

</div>
</body>
</html>
