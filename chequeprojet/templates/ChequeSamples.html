{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Samples | Cheque Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        *{margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif;}
        body{min-height:100vh; background:url('{% static "images/bg.jpg" %}') center/cover fixed; color:#111;}
        .overlay{min-height:100vh; background:rgba(255,255,255,0.45); backdrop-filter:blur(5px);}

        /* RESPONSIVE NAVBAR */
        .navbar{
            display:flex; justify-content:space-between; align-items:center;
            padding:15px 5%; background:rgba(255,255,255,0.9);
            backdrop-filter:blur(20px); border-bottom:1px solid rgba(0,0,0,0.1);
            position:sticky; top:0; z-index:1000;
        }
        .navbar-brand{font-size:1.3rem; font-weight:800; color:#000; letter-spacing:-0.5px;}
        .navbar ul{list-style:none; display:flex; gap:10px;}
        .navbar ul li a{
            text-decoration:none; color:#444; font-weight:600; font-size:0.85rem;
            padding:10px 14px; border-radius:12px; transition:0.3s;
            display:flex; align-items:center; gap:8px;
        }
        .navbar ul li a i{font-size:1.1rem;}
        .navbar ul li a:hover, .navbar ul li a.active{background:#007aff; color:#fff;}

        /* MOBILE NAV */
        @media(max-width:768px){
            .navbar{padding:10px 3%; flex-direction:column; gap:8px;}
            .navbar ul{width:100%; justify-content:space-between; gap:2px;}
            .navbar ul li a{padding:8px 10px; flex-direction:column; font-size:0.65rem; gap:4px; flex:1; text-align:center;}
            .navbar ul li a i{font-size:1.3rem;}
        }

        .content{padding:40px 5%;}
        .glass-card{
            max-width:1100px; margin:auto; padding:35px;
            background:rgba(255,255,255,0.9); border-radius:24px;
            box-shadow:0 20px 50px rgba(0,0,0,0.08); border:1px solid rgba(255,255,255,0.4);
        }
        .glass-card h1{font-size:1.8rem; font-weight:800; text-align:center; margin-bottom:30px;}

        .samples-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .sample-box {
            background:#fff; padding:12px; border-radius:18px;
            box-shadow:0 10px 25px rgba(0,0,0,0.05); text-align:center;
            border:1px solid #eee; transition:0.3s;
        }
        .sample-box:hover{transform:translateY(-5px); box-shadow:0 15px 35px rgba(0,0,0,0.15);}
        .sample-box img {
            width: 100%; border-radius:12px; 
            aspect-ratio: 2/1; object-fit:cover;
        }

        footer{text-align:center; padding:40px 20px; color:#666; font-size:0.85rem;}
    </style>
</head>
<body>
<div class="overlay">

    <nav class="navbar">
        <div class="navbar-brand">🏦 Cheque Verification</div>
        <ul>
            <li><a href="{% url 'userhome' %}"><i class="fa-solid fa-house"></i> <span>Home</span></a></li>
            <li><a href="{% url 'ChequeSamples' %}" class="active"><i class="fa-solid fa-file-invoice"></i> <span>Samples</span></a></li>
            <li><a href="{% url 'model_evaluation' %}"><i class="fa-solid fa-square-poll-vertical"></i> <span>Eval</span></a></li>
            <li><a href="{% url 'prediction' %}"><i class="fa-solid fa-microchip"></i> <span>Prediction</span></a></li>
            <li><a href="{% url 'logout' %}"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></a></li>
        </ul>
    </nav>

    <div class="content">
        <div class="glass-card">
            <h1>Cheque Dataset Samples</h1>
            <div class="samples-grid">
                {% for img in images %}
                <div class="sample-box">
                    <img src="{{ img }}" alt="Cheque Image">
                </div>
                {% empty %}
                <p style="text-align:center; grid-column:1/-1;">No samples available.</p>
                {% endfor %}
            </div>
        </div>
    </div>

    <footer>
        © 2026 Cheque Verification System | Sample Analysis View
    </footer>

</div>
</body>
</html>
